format = """
$username\
$hostname\
[ ▸ ](bold bright-black)\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character
"""

add_newline = false

# ──────────────────────────────────────────────
# USER
# ──────────────────────────────────────────────
[username]
style_user = "bold bright-blue"
format = "[$user]($style)"
show_always = true

# ──────────────────────────────────────────────
# HOSTNAME (SSH ONLY)
# ──────────────────────────────────────────────
[hostname]
ssh_only = true
style = "bold bright-black"
format = "[@$hostname]($style)"

# ──────────────────────────────────────────────
# DIRECTORY (CHANGED)
# ──────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = "…/"
format = "[ $path ]($style)"

# ──────────────────────────────────────────────
# GIT
# ──────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bold bright-yellow"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bold bright-yellow"
format = "[ $all_status ]($style)"

# ──────────────────────────────────────────────
# COMMAND DURATION
# ──────────────────────────────────────────────
[cmd_duration]
min_time = 400
style = "bold bright-yellow"
format = "[ ⏱ $duration ]($style)"

# ──────────────────────────────────────────────
# PROMPT SYMBOL (COLOR = SUCCESS / FAILURE)
# ──────────────────────────────────────────────
[character]
success_symbol = "[▶](bold bright-blue)"
error_symbol   = "[▶](bold red)"
